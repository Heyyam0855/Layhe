<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
</head>
<body>
    <h1>API Test Səhifəsi</h1>
    
    <h2>Şirkət Məlumatları:</h2>
    <div id="company-info">Yüklənir...</div>
    
    <h2>Xidmətlər:</h2>
    <div id="services">Yüklənir...</div>
    
    <h2>Komanda:</h2>
    <div id="team">Yüklənir...</div>
    
    <h2>Testlər:</h2>
    <div id="tests">Yüklənir...</div>
    
    <h2>FAQ-lar:</h2>
    <div id="faq">Yüklənir...</div>

    <script>
        console.log('API Test səhifəsi yükləndi');
        
        // Company info test
        fetch('/api/core/company-info/')
            .then(response => response.json())
            .then(data => {
                console.log('Company data:', data);
                document.getElementById('company-info').innerHTML = `
                    <p><strong>Ad:</strong> ${data.company?.name || 'N/A'}</p>
                    <p><strong>Təsvir:</strong> ${data.company?.description || 'N/A'}</p>
                    <p><strong>Xidmət sayı:</strong> ${data.services?.length || 0}</p>
                    <p><strong>Komanda sayı:</strong> ${data.team_members?.length || 0}</p>
                `;
                
                // Services
                const servicesHtml = data.services?.map(s => `<li>${s.title}: ${s.description}</li>`).join('') || '<li>Xidmət yoxdur</li>';
                document.getElementById('services').innerHTML = '<ul>' + servicesHtml + '</ul>';
                
                // Team
                const teamHtml = data.team_members?.map(m => `<li>${m.full_name} - ${m.position_display}</li>`).join('') || '<li>Komanda üzvü yoxdur</li>';
                document.getElementById('team').innerHTML = '<ul>' + teamHtml + '</ul>';
            })
            .catch(error => {
                console.error('Company API error:', error);
                document.getElementById('company-info').innerHTML = 'Xəta: ' + error.message;
            });
        
        // Tests
        fetch('/api/tests/categories/')
            .then(response => response.json())
            .then(data => {
                console.log('Tests data:', data);
                const testsHtml = data.results?.map(t => `<li>${t.name} (${t.test_count} test)</li>`).join('') || '<li>Test yoxdur</li>';
                document.getElementById('tests').innerHTML = '<ul>' + testsHtml + '</ul>';
            })
            .catch(error => {
                console.error('Tests API error:', error);
                document.getElementById('tests').innerHTML = 'Xəta: ' + error.message;
            });
        
        // FAQ
        fetch('/api/core/faq/')
            .then(response => response.json())
            .then(data => {
                console.log('FAQ data:', data);
                const faqHtml = data.results?.map(f => `<li><strong>${f.question}</strong><br>${f.answer}</li>`).join('') || '<li>FAQ yoxdur</li>';
                document.getElementById('faq').innerHTML = '<ul>' + faqHtml + '</ul>';
            })
            .catch(error => {
                console.error('FAQ API error:', error);
                document.getElementById('faq').innerHTML = 'Xəta: ' + error.message;
            });
    </script>
</body>
</html>
