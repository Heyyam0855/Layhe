{% load static %}
<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daxil Ol - Mağaza.az</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="header">
                <div class="icon">✦</div>
                <h1 class="title">Mağaza.az</h1>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" id="loginForm" class="auth-form">
                {% csrf_token %}
                
                <!-- E-poçt sahəsi -->
                <div class="form-group">
                    <label for="email" class="form-label">E-poçt</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="username" 
                        class="form-input" 
                        placeholder="E-poçtunuzu daxil edin"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <!-- Şifrə sahəsi -->
                <div class="form-group">
                    <label for="password" class="form-label">Şifrə</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Şifrənizi daxil edin"
                        required
                    >
                    <span class="error-message" id="passwordError"></span>
                </div>

                <!-- Məni yadda saxla və şifrəni unutmusunuz -->
                <div class="form-options">
                    <label class="checkbox-label">
                        <input 
                            type="checkbox" 
                            id="rememberMe" 
                            name="remember_me"
                        >
                        <span class="checkbox-text">Məni yadda saxla</span>
                    </label>
                    <a href="{% url 'forgot_password' %}" class="link">Şifrəni unutmusunuz?</a>
                </div>

                <!-- Daxil ol düyməsi -->
                <button type="submit" class="btn btn-primary">
                    Daxil ol
                </button>

                <!-- Ayırıcı -->
                <div class="divider">
                    <span>Yeni istifadəçisiniz?</span>
                </div>

                <!-- Qeydiyyat düyməsi -->
                <a href="{% url 'register' %}" class="btn btn-secondary">
                    Yeni hesab yaradın
                </a>
            </form>

            <!-- Footer -->
            <div class="footer">
                <p>Davam etməklə, siz şərtlərimizi və məxfilik siyasətimizi qəbul edirsiniz.</p>
            </div>
        </div>
    </div>

    <script src="{% static 'js/login.js' %}"></script>
</body>
</html>
